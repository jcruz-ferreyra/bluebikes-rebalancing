# tasks/prepare_network/conf/config.yaml

# Depot location (not in stations file)
# Format: [latitude, longitude]
depot_lat_lon: [42.338629, -71.106500]

# Network bounding box for OSM download
# Format: [west, south, east, north] in EPSG:4326
network_bbox: [-71.117, 42.329, -71.078, 42.353]

# Output storage location
output_storage: "local"  # "local" or "drive"

# Hydra: per-run experiment outputs (config snapshot + logs) under LOCAL_DIR
hydra:
  job:
    name: prepare_network
    chdir: false  # keep the launch cwd; data paths are absolute, run dir is for logs/provenance
  run:
    dir: ${oc.env:LOCAL_DIR,${hydra.runtime.cwd}}/experiments/prepare_network/${now:%Y-%m-%d_%H-%M-%S}
  sweep:
    dir: ${oc.env:LOCAL_DIR,${hydra.runtime.cwd}}/experiments/prepare_network/multirun/${now:%Y-%m-%d_%H-%M-%S}
    subdir: ${hydra.job.num}
