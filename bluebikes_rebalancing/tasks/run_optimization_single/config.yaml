# tasks/run_optimization_single/config.yaml

# Target date for optimization
target_date: "2026-03-04"    # YYYY-MM-DD format

# Model parameters
model_params:
  # Vehicle and operational parameters
  truck_capacity: 20         # Q: vehicle capacity in bikes
  buffer: 2                  # B: minimum bikes and docks at each station after rebalancing

  # Objective function weights
  alpha: 1.0                 # distance cost weight ($/meter)
  beta: 10.0                 # service quality weight ($/bike²)

  # Time parameters (all in minutes)
  service_time: 5.0          # fixed time per station stop
  time_per_bike: 1.0         # variable time per bike loaded/unloaded
  max_operation_time: 180.0  # T_MAX: total operational window (3 hours)

# Solver configuration
solver_params:
  factory: "gurobi"          # "gurobi", "cplex", or "glpk"
  time_limit: 600            # solver time limit in seconds (5 minutes)
  mip_gap: 0.02           # relative MIP optimality gap (2%)
  threads: 8                 # number of solver threads

# Plot configuration
plot_params:
  save_plot: true            # whether to save the rebalancing map
  zoom: 15                  # basemap tile zoom level

# Output storage location
output_storage: "local"      # "local" or "drive"