# conf/storage/local.yaml
# Shared storage group: medallion roots on the local machine, from .env via oc.env.
# Values land in the job config, so hydra references use the colon resolver.

name: local
data_dir: ${oc.env:LOCAL_DIR,${hydra:runtime.cwd}}/${oc.env:DATA_FOLDER,data}
models_dir: ${oc.env:LOCAL_DIR,${hydra:runtime.cwd}}/${oc.env:MODELS_FOLDER,models}
